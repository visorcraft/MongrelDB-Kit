[workspace]
members = [
    "crates/mongreldb-kit-core",
    "crates/mongreldb-kit",
    "crates/mongreldb-kit-python",
    "crates/mongreldb-kit-cli",
    "tests/conformance/rust",
]
resolver = "2"

# Dev-only: unify `mongreldb-core`/`mongreldb-query` (consumed from crates.io by
# the kit) with the same engine sources the conformance runner's
# `mongreldb-server` dev-dependency pulls, so `build_app(Arc<Database>)` shares
# one `mongreldb-core` type instance. `[patch.crates-io]` is stripped by
# `cargo publish`, so published kits are unaffected.
[patch.crates-io]
mongreldb-core = { git = "https://github.com/visorcraft/MongrelDB.git", tag = "v0.29.0" }
mongreldb-query = { git = "https://github.com/visorcraft/MongrelDB.git", tag = "v0.29.0" }
