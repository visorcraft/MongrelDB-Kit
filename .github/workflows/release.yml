# Publishes @visorcraft/mongreldb-kit to npm, mongreldb-kit-core + mongreldb-kit
# to crates.io, mongreldb-kit (Python) to PyPI, and the mongreldb-kit-cli
# binaries to the GitHub release — all on a version tag.
#
# Order matters: publish the engine (@visorcraft/mongreldb / mongreldb-core)
# FIRST, in the MongrelDB repo — the npm job installs it from the registry to
# satisfy the peer dependency and typecheck/build, and the crates.io job
# resolves mongreldb-core = "x.y.z" from the registry once the path dep is
# stripped at publish time. Cut a kit release by pushing a tag, e.g.
# `git tag v0.7.0 && git push --tags`.
#
# The PyPI publish uses Trusted Publishing (OIDC) — no API token. Requires
# registering this repo as a trusted publisher at
# https://pypi.org/manage/account/publishing/ (PyPI → Add a pending publisher:
# PyPI project name = mongreldb-kit, owner = visorcraft, repo = mongreldb-kit,
# workflow = release.yml, environment = pypi).
#
# Requires repo secrets:
#   NPM_TOKEN            — granular npm access token, write access to @visorcraft
#   CARGO_REGISTRY_TOKEN — crates.io API token, publish scope
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write # npm provenance

env:
  # Swatinem/rust-cache bundles deps that still `require('punycode')`, which
  # Node flags as DEP0040. Upstream noise we can't fix here, so silence it for
  # the action's Node runtime.
  NODE_OPTIONS: "--disable-warning=DEP0040"

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/kit
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: '@visorcraft'

      # The committed lockfile points @visorcraft/mongreldb at the sibling
      # engine checkout used by local/CI integration jobs. Release only checks
      # out this repo, so install from package.json and let npm fetch the
      # already-published peer from the registry for typecheck/build.
      - name: Wait for MongrelDB npm peer
        run: |
          ENGINE_VERSION="$(node -p "require('./package.json').peerDependencies['@visorcraft/mongreldb'].replace(/^[^0-9]*/, '')")"
          for attempt in {1..80}; do
            if npm view "@visorcraft/mongreldb@${ENGINE_VERSION}" version; then
              exit 0
            fi
            echo "waiting for @visorcraft/mongreldb@${ENGINE_VERSION} on npm (${attempt}/80)"
            sleep 15
          done
          echo "::error::@visorcraft/mongreldb@${ENGINE_VERSION} is not available on npm"
          exit 1

      - run: npm install --package-lock=false

      - run: npm run build

      # Runtime tests load the engine's native addon. The full CI integration
      # job builds that addon on the runner and tests against it; release only
      # needs the published peer for type declarations before publishing Kit.

      - name: Publish npm package
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "@visorcraft/mongreldb-kit@${VERSION}" version >/dev/null 2>&1; then
            echo "@visorcraft/mongreldb-kit@${VERSION} already published"
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2.9.1

      # mongreldb-kit depends on mongreldb-kit-core by path+version; crates.io
      # publish strips the path, so mongreldb-kit-core must already be live on
      # the registry before mongreldb-kit's publish can resolve it.
      - name: Publish Kit crates
        run: |
          publish_crate() {
            for attempt in {1..5}; do
              output="$(cargo publish -p "$1" 2>&1)" && { echo "$output"; return 0; }
              echo "$output"
              if echo "$output" | grep -qE 'already exists|already published'; then
                return 0
              fi
              echo "retrying $1 (${attempt}/5)"
              sleep 30
            done
            return 1
          }
          publish_crate mongreldb-kit-core
          publish_crate mongreldb-kit
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-cli-linux-binaries:
    runs-on: ubuntu-latest
    needs: [publish, publish-crates]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset: mongreldb-kit-linux-x64
            apt: ''
            linker: ''
            ar: ''
          - target: aarch64-unknown-linux-gnu
            asset: mongreldb-kit-linux-arm64
            apt: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
            ar: aarch64-linux-gnu-ar
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2.9.1

      - if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - run: cargo build --release -p mongreldb-kit-cli --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.linker }}
          AR_aarch64_unknown_linux_gnu: ${{ matrix.ar }}

      - run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/mongreldb-kit dist/${{ matrix.asset }}
          chmod +x dist/${{ matrix.asset }}

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/${{ matrix.asset }}

  release-cli-darwin-binaries:
    runs-on: macos-14
    needs: [publish, publish-crates]
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2.9.1

      - run: cargo build --release -p mongreldb-kit-cli --target x86_64-apple-darwin

      - run: cargo build --release -p mongreldb-kit-cli --target aarch64-apple-darwin

      - run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/mongreldb-kit dist/mongreldb-kit-darwin-arm64
          lipo -create \
            target/x86_64-apple-darwin/release/mongreldb-kit \
            target/aarch64-apple-darwin/release/mongreldb-kit \
            -output dist/mongreldb-kit-darwin-universal
          chmod +x dist/mongreldb-kit-darwin-arm64 dist/mongreldb-kit-darwin-universal

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/mongreldb-kit-darwin-arm64
            dist/mongreldb-kit-darwin-universal

  # Build and publish multi-platform wheels to PyPI. Uses Trusted Publishing
  # (OIDC) — no API token required, but the repo must be registered as a
  # trusted publisher at https://pypi.org/manage/account/publishing/.
  publish-python:
    needs: [publish-crates]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: auto
          - runner: macos-14
            target: aarch64-apple-darwin
            manylinux: ''
          - runner: macos-15
            target: x86_64-apple-darwin
            manylinux: ''
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ''
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --find-interpreter
          manylinux: ${{ matrix.manylinux }}
          working-directory: python/mongreldb_kit
          # `--find-interpreter` is required for the manylinux docker builds:
          # actions/setup-python only provisions the host runner, so in the
          # containerized Linux build maturin must discover the CPython
          # interpreters under /opt/python itself. On macOS/Windows (host
          # builds) it picks up the setup-python interpreter. Wheels land in
          # the cargo workspace's target/wheels (repo root), not under the
          # working-directory. The PyO3 module pulls mongreldb-kit +
          # mongreldb-kit-core from crates.io (path deps stripped at
          # publish), so wait for the publish-crates job first.

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.target }}
          path: target/wheels/*.whl
          if-no-files-found: error

  publish-python-to-pypi:
    needs: [publish-python]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Trusted Publishing (OIDC) — no API token. Requires registering this
      # repo as a trusted publisher on PyPI.
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # skip-existing prevents re-publishing identical wheels (e.g. on a
          # re-run after a partial failure).
          skip-existing: true
