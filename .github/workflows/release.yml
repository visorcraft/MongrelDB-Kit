# Publishes @visorcraft/mongreldb-kit to npm on a version tag.
#
# Order matters: publish the engine (@visorcraft/mongreldb) FIRST, because this
# job installs it from npm to satisfy the peer dependency and typecheck/build.
# Cut a kit release by pushing a tag, e.g. `git tag v0.7.0 && git push --tags`.
#
# Requires repo secret NPM_TOKEN: a granular npm access token with
# write access to the @visorcraft scope.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/kit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: '@visorcraft'

      # The committed lockfile points @visorcraft/mongreldb at the sibling
      # engine checkout used by local/CI integration jobs. Release only checks
      # out this repo, so install from package.json and let npm fetch the
      # already-published peer from the registry for typecheck/build.
      - run: npm install --package-lock=false

      - run: npm run build

      # Runtime tests load the engine's native addon. The full CI integration
      # job builds that addon on the runner and tests against it; release only
      # needs the published peer for type declarations before publishing Kit.

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
