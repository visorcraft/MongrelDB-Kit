name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - "assets/**"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - "assets/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Swatinem/rust-cache bundles deps that still `require('punycode')`, which
  # Node flags as DEP0040. Upstream noise we can't fix here, so silence it for
  # the action's Node runtime.
  NODE_OPTIONS: "--disable-warning=DEP0040"

jobs:
  # Fast feedback. `mongreldb-kit-core` itself does not link against the
  # MongrelDB engine, but the workspace cannot be resolved without the engine
  # present: `crates/mongreldb-kit` depends on it via a sibling path dep
  # (`../../../mongreldb/...`), and every `cargo` invocation loads the whole
  # workspace manifest. So the engine is checked out as a sibling here too,
  # matching the integration job layout. `tsc --noEmit` / the Python facade
  # import still do not exercise the native addon.
  lint-and-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kit
        uses: actions/checkout@v7
        with:
          path: MongrelDB-Kit

      - name: Checkout MongrelDB engine (sibling)
        uses: actions/checkout@v7
        with:
          repository: visorcraft/mongreldb
          ref: master
          path: mongreldb
          token: ${{ secrets.MONGRELDB_TOKEN || github.token }}

      - name: Install Rust (rustfmt, clippy)
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: MongrelDB-Kit

      - name: rustfmt
        working-directory: MongrelDB-Kit
        run: cargo fmt --all --check

      - name: clippy (core crate)
        working-directory: MongrelDB-Kit
        run: cargo clippy -p mongreldb-kit-core --all-targets -- -D warnings

      - name: Rust core tests
        working-directory: MongrelDB-Kit
        run: cargo test -p mongreldb-kit-core

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: TypeScript typecheck
        working-directory: MongrelDB-Kit/packages/kit
        run: |
          npm ci --ignore-scripts --legacy-peer-deps
          mkdir -p node_modules/@visorcraft
          ln -sfn "$GITHUB_WORKSPACE/mongreldb/crates/mongreldb-node" node_modules/@visorcraft/mongreldb
          npm run check

      - name: Python facade syntax check
        working-directory: MongrelDB-Kit
        # The facade's __init__ eagerly imports the native extension, which this
        # fast job doesn't build, so byte-compile the pure-Python sources for a
        # syntax check instead of importing them. The full import + tests run in
        # the python-integration job.
        run: python -m py_compile python/mongreldb_kit/mongreldb_kit/*.py

  rust-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kit
        uses: actions/checkout@v7
        with:
          path: MongrelDB-Kit

      - name: Checkout MongrelDB engine (sibling)
        uses: actions/checkout@v7
        with:
          repository: visorcraft/mongreldb
          ref: master
          path: mongreldb
          token: ${{ secrets.MONGRELDB_TOKEN || github.token }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: MongrelDB-Kit
          key: rust-integration

      - name: clippy (workspace)
        working-directory: MongrelDB-Kit
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust workspace tests
        working-directory: MongrelDB-Kit
        run: cargo test --workspace

      - name: Conformance
        working-directory: MongrelDB-Kit
        run: cargo run -p conformance-runner

  node-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kit
        uses: actions/checkout@v7
        with:
          path: MongrelDB-Kit

      - name: Checkout MongrelDB engine (sibling)
        uses: actions/checkout@v7
        with:
          repository: visorcraft/mongreldb
          ref: master
          path: mongreldb
          token: ${{ secrets.MONGRELDB_TOKEN || github.token }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: mongreldb/crates/mongreldb-node
          key: node-integration

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build MongrelDB Node addon
        working-directory: mongreldb/crates/mongreldb-node
        run: |
          npm ci
          npm run build

      - name: Link engine addon for the kit
        working-directory: MongrelDB-Kit/packages/kit
        run: |
          npm ci --ignore-scripts --legacy-peer-deps
          mkdir -p node_modules/@visorcraft
          ln -sfn "$GITHUB_WORKSPACE/mongreldb/crates/mongreldb-node" node_modules/@visorcraft/mongreldb

      - name: TypeScript build + tests
        working-directory: MongrelDB-Kit/packages/kit
        run: |
          npm run build
          npm test

  python-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kit
        uses: actions/checkout@v7
        with:
          path: MongrelDB-Kit

      - name: Checkout MongrelDB engine (sibling)
        uses: actions/checkout@v7
        with:
          repository: visorcraft/mongreldb
          ref: master
          path: mongreldb
          token: ${{ secrets.MONGRELDB_TOKEN || github.token }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: MongrelDB-Kit
          key: python-integration

      - name: Python build (PyO3) + tests
        working-directory: MongrelDB-Kit
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip maturin pytest
          # Build from the facade's pyproject so the extension installs as the
          # `mongreldb_kit.mongreldb_kit_py` submodule (module-name in
          # pyproject.toml), not a top-level module the `-m Cargo.toml` form
          # would produce — the facade does `from .mongreldb_kit_py import ...`.
          (cd python/mongreldb_kit && maturin develop)
          PYTHONPATH=python/mongreldb_kit python -m pytest python/tests tests/conformance/python -q
